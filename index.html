<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Monthsary my loveydanging ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* 💕 floating hearts background */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: pink;
  transform: rotate(45deg);
  animation: floatUp 6s infinite ease-in;
  opacity: 0.7;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50%;
}

.heart::before { top: -7px; left: 0; }
.heart::after { left: -7px; top: 0; }

@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(45deg); }
  100% { transform: translateY(-10vh) rotate(45deg); }
}

/* 💖 main card */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 2;
}

.card {
  background: rgba(255,255,255,0.25);
  padding: 50px;
  border-radius: 25px;
  backdrop-filter: blur(10px);
}

h1 {
  color: white;
  font-size: 50px;
}

p {
  color: white;
}

/* 💖 button */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #ff69b4;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}

/* next page effect */
a {
  text-decoration: none;
}
</style>
</head>

<body>

<!-- 💕 hearts -->
<script>
for(let i=0;i<25;i++){
  let h = document.createElement("div");
  h.className = "heart";
  h.style.left = Math.random()*100+"vw";
  h.style.animationDuration = (3+Math.random()*5)+"s";
  document.body.appendChild(h);
}
</script>

<div class="container">

  <div class="card">

    <h1>Happy Monthsary ❤️</h1>

    <p>Click the heart button to continue our story 💕</p>

    <!-- 💖 NEXT PAGE -->
    <a href="page2.html">
      <button>❤️ Enter ❤️</button>
    </a>

  </div>

</div>

</body>
</html>
