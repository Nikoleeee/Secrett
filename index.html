<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      /* 🌸 BACKGROUND */
      background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(0,0,0,0.45);
      min-height: 100vh;
      padding: 60px 20px;
    }

    h1 {
      font-size: 55px;
      margin-top: 80px;
      color: #ffb6c1;
      text-shadow: 2px 2px 10px black;
    }

    p {
      font-size: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 40px;
      backdrop-filter: blur(8px);
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: pink;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: hotpink;
      color: white;
      transform: scale(1.1);
    }

    .heart {
      font-size: 30px;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>

<body>

  <div class="overlay">

    <div class="card">

      <div class="heart">❤️</div>

      <h1>Happy Monthsary</h1>

      <p>
        Another month with you, and I still choose you every day 💕<br>
        Thank you for making my life brighter and happier.
      </p>

      <button onclick="alert('I love you so much ❤️🥺')">
        Click me, love
      </button>

    </div>

  </div>

</body>
</html>
