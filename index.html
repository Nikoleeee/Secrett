<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      /* 🌸 BACKGROUND IMAGE */
      background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      min-height: 100vh;
      padding: 50px;
    }

    h1 {
      font-size: 50px;
      margin-top: 80px;
    }

    p {
      font-size: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: pink;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: hotpink;
      color: white;
    }
  </style>
</head>

<body>

  <div class="overlay">

    <h1>Happy Monthsary ❤️</h1>

    <p>
      Another month with you feels like a blessing.<br>
      Thank you for making me happy every day 💕
    </p>

    <button onclick="alert('I love you so much ❤️')">
      Click this, love
    </button>

  </div>

</body>
</html>
